# advection-diffusion on the unit square (global Peclet = 2):
# inflow q=0 on the left, q=1 on the right, zero-flux walls top/bottom.
# the operator is nonsymmetric, so the solver is GMRES (CG does not apply).
mesh       square-20.msh
equation   advection_diffusion
kappa      1.0
velocity   2.0 0.0 0.0
convection central
source     0.0
boundary   BoundaryLeft   dirichlet 0.0
boundary   BoundaryRight  dirichlet 1.0
boundary   BoundaryTop    neumann   0.0
boundary   BoundaryBottom neumann   0.0
solver     gmres
max_tol    1.0e-12
max_it     5000
output     advection.vtu
