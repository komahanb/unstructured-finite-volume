# transient heat conduction in a box (backward euler)
# interior starts cold (phi = 0); bottom is held hot, top held cold and
# the four sides are insulated - watch the field diffuse to steady state.
mesh      ../../test/box-3.msh
equation  diffusion
kappa     1.0
source    0.0
boundary  bottom dirichlet 100.0
boundary  top    dirichlet 0.0
boundary  front  neumann   0.0
boundary  back   neumann   0.0
boundary  left   neumann   0.0
boundary  right  neumann   0.0
dt        10.0
t_init    0.0
t_final   200.0
max_tol   1.0e-13
max_it    500
output    heat.vtu
