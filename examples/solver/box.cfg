# poisson-style dirichlet box (reproduces the old hardcoded box-3 case)
mesh      ../../test/box-3.msh
equation  diffusion
kappa     1.0
source    0.0
boundary  front  dirichlet 5.0
boundary  bottom dirichlet 10.0
boundary  right  dirichlet 15.0
boundary  top    dirichlet 0.0
boundary  left   dirichlet 0.0
boundary  back   dirichlet 0.0
solver    cg
max_tol   1.0e-13
max_it    200
output    box.vtu
